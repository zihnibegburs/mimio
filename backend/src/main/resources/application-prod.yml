spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  data:
    redis:
      url: ${REDIS_URL}

  jpa:
    show-sql: false

logging:
  level:
    com.mimio: INFO
    root: WARN

mimio:
  jwt:
    secret: ${MIMIO_JWT_SECRET}
  groq:
    api-key: ${GROQ_API_KEY:}
