spring:
  application:
    name: mimio-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mimio
    username: mimio
    password: mimio_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6380

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

mimio:
  jwt:
    secret: mimio-dev-secret-key-change-in-production-min-256-bits-long!!
    expiration-ms: 86400000
  ollama:
    base-url: http://localhost:11434
    model: llama3.2:3b
    timeout-seconds: 120

logging:
  level:
    com.mimio: DEBUG
