spring:
  application:
    name: mimio-backend
  config:
    import: optional:classpath:application-local.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/mimio
    username: mimio
    password: mimio_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6380

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

mimio:
  jwt:
    secret: mimio-dev-secret-key-change-in-production-min-256-bits-long!!
    expiration-ms: 86400000
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    timeout-seconds: 60

logging:
  level:
    com.mimio: DEBUG
