name: mimio
description: Visual daily planner for neurodivergent minds — Tiimo-inspired.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  home_widget: ^0.7.0
  live_activities: ^2.3.0
  speech_to_text: ^7.4.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  device_calendar: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
