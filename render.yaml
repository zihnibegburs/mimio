# Render Blueprint — Mimio full stack
# Dashboard: New → Blueprint → bu repo'yu seç
services:
  - type: web
    name: mimio-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: mimio-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mimio-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mimio-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mimio-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mimio-db
          property: password
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mimio-redis
          property: connectionString
      - key: MIMIO_JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: mimio-web
    runtime: static
    buildCommand: bash mobile/scripts/render-build.sh
    staticPublishPath: mobile/build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: mimio-api
          property: host

  - type: keyvalue
    name: mimio-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: mimio-db
    databaseName: mimio
    user: mimio
    plan: free
